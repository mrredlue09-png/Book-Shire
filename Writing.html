<!DOCTYPE html>
<html>
<head>
<title>Write Your Story</title>

<style>
body{
    font-family: Arial;
    background:#f4f4f4;
    text-align:center;
}

.container{
    width:60%;
    margin:auto;
    margin-top:40px;
}

textarea{
    width:100%;
    height:300px;
    font-size:16px;
    padding:10px;
}

input{
    width:100%;
    padding:10px;
    font-size:18px;
    margin-bottom:10px;
}

button{
    padding:12px 20px;
    font-size:18px;
    background:#ff7b00;
    border:none;
    color:white;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<h1>Write Your Story</h1>

<input type="text" placeholder="Story Title">

<textarea placeholder="Start writing your story here..."></textarea>

<br><br>

<button>Publish</button>

<br><br>

<a href="index.html">⬅ Back to Home</a>

</div>

</body>
</html>
